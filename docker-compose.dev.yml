version: '3.8'

services:
  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: erp-rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"   # AMQP port
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-admin123}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - rabbitmq_logs:/var/log/rabbitmq
    networks:
      - erp-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Auth Service
  auth-service:
    build:
      context: .
      dockerfile: apps/auth/Dockerfile
    container_name: erp-auth-service
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      AUTH_SERVICE_PORT: 3001
      RABBITMQ_URL: amqp://rabbitmq:5672
      RABBITMQ_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-admin123}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - erp-network
    restart: unless-stopped

  # User Service
  user-service:
    build:
      context: .
      dockerfile: apps/user/Dockerfile
    container_name: erp-user-service
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      USER_SERVICE_PORT: 3002
      RABBITMQ_URL: amqp://rabbitmq:5672
      RABBITMQ_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-admin123}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - erp-network
    restart: unless-stopped

  # Notification Service
  notification-service:
    build:
      context: .
      dockerfile: apps/notification/Dockerfile
    container_name: erp-notification-service
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: production
      NOTIFICATION_SERVICE_PORT: 3003
      RABBITMQ_URL: amqp://rabbitmq:5672
      RABBITMQ_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-admin123}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - erp-network
    restart: unless-stopped

networks:
  erp-network:
    driver: bridge

volumes:
  rabbitmq_data:
  rabbitmq_logs:
