
services:
  # MongoDB Database
  mongodb:
    image: mongo
    container_name: erp-mongodb
    hostname: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER:-erp_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASS:-erp_password}
      MONGO_INITDB_DATABASE: ${MONGODB_DB:-open_erp}
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - erp-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:management-alpine
    container_name: erp-rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"   # AMQP port
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-admin123}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - rabbitmq_logs:/var/log/rabbitmq
    networks:
      - erp-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Auth Service
  auth-service:
    build:
      context: .
      dockerfile: apps/auth/Dockerfile
    container_name: erp-auth-service
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      AUTH_SERVICE_PORT: 3001
      ENABLE_SWAGGER: ${ENABLE_SWAGGER:-true}
      RABBITMQ_URL: amqp://rabbitmq:5672
      RABBITMQ_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-admin123}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      RABBITMQ_HEARTBEAT: ${RABBITMQ_HEARTBEAT:-30}
      RABBITMQ_PREFETCH: ${RABBITMQ_PREFETCH:-10}
      RABBITMQ_RECONNECT_TIME: ${RABBITMQ_RECONNECT_TIME:-5}
      RABBITMQ_HANDLER_TIMEOUT: ${RABBITMQ_HANDLER_TIMEOUT:-30000}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - erp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # User Service
  user-service:
    build:
      context: .
      dockerfile: apps/user/Dockerfile
    container_name: erp-user-service
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      USER_SERVICE_PORT: 3002
      ENABLE_SWAGGER: ${ENABLE_SWAGGER:-true}
      RABBITMQ_URL: amqp://rabbitmq:5672
      RABBITMQ_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-admin123}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      RABBITMQ_HEARTBEAT: ${RABBITMQ_HEARTBEAT:-30}
      RABBITMQ_PREFETCH: ${RABBITMQ_PREFETCH:-10}
      RABBITMQ_RECONNECT_TIME: ${RABBITMQ_RECONNECT_TIME:-5}
      RABBITMQ_HANDLER_TIMEOUT: ${RABBITMQ_HANDLER_TIMEOUT:-30000}
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_USER: ${MONGODB_USER:-erp_user}
      MONGODB_PASS: ${MONGODB_PASS:-erp_password}
      MONGODB_DB: ${MONGODB_DB:-open_erp}
      MONGODB_AUTH_SOURCE: admin
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - erp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Notification Service
  notification-service:
    build:
      context: .
      dockerfile: apps/notification/Dockerfile
    container_name: erp-notification-service
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: production
      NOTIFICATION_SERVICE_PORT: 3003
      ENABLE_SWAGGER: ${ENABLE_SWAGGER:-true}
      RABBITMQ_URL: amqp://rabbitmq:5672
      RABBITMQ_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-admin123}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      RABBITMQ_HEARTBEAT: ${RABBITMQ_HEARTBEAT:-30}
      RABBITMQ_PREFETCH: ${RABBITMQ_PREFETCH:-10}
      RABBITMQ_RECONNECT_TIME: ${RABBITMQ_RECONNECT_TIME:-5}
      RABBITMQ_HANDLER_TIMEOUT: ${RABBITMQ_HANDLER_TIMEOUT:-30000}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - erp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # API Docs Aggregator
  docs-aggregator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: erp-docs-aggregator
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      SWAGGER_AGGREGATOR_SERVICES: '[{"name":"Auth Service","url":"http://auth-service:3001/api-docs.json"},{"name":"User Service","url":"http://user-service:3002/api-docs.json"},{"name":"Notification Service","url":"http://notification-service:3003/api-docs.json"}]'
    depends_on:
      - auth-service
      - user-service
      - notification-service
    networks:
      - erp-network
    restart: unless-stopped

networks:
  erp-network:
    driver: bridge

volumes:
  mongodb_data:
  mongodb_config:
  rabbitmq_data:
  rabbitmq_logs:
